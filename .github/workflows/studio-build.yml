name: studio-build

# Cross-platform Tauri bundles for Parametic Studio (macOS aarch64 + Windows).
# Unsigned: no macOS notarization, no Windows Authenticode — follow-up (see docs/PACKAGING.md).
on:
  workflow_dispatch:
  push:
    tags:
      - "studio-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        working-directory: studio_web
        run: npm ci

      # tauri-action installs the Rust toolchain and runs `npm run tauri build`.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: studio_web
          args: --target ${{ matrix.target }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: parametic-studio-${{ matrix.target }}
          path: |
            studio_web/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            studio_web/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            studio_web/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            studio_web/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore
